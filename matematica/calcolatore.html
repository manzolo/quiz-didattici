<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatore di Equivalenze</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .container {
            background: white;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #667eea;
            text-decoration: none;
            font-size: 1em;
            font-weight: bold;
            padding: 10px 20px;
            background: white;
            border: 2px solid #667eea;
            border-radius: 10px;
            transition: all 0.3s;
            position: absolute;
            top: 20px;
            left: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .back-button:hover {
            background: #667eea;
            color: white;
            transform: translateX(-5px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .language-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .lang-btn {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .lang-btn:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .lang-btn.active {
            background: #667eea;
            color: white;
        }

        .input-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .category-tabs {
            display: flex;
            gap: 15px;
        }

        .tab {
            flex: 1;
            padding: 15px 20px;
            background: #e9ecef;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .tab:hover {
            background: #d3d6db;
            transform: translateY(-2px);
        }

        .tab.active {
            background: #667eea;
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .results {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex: 1;
            overflow-x: auto;
            padding: 20px;
        }

        .unit-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            max-width: 180px;
            min-width: 120px;
            padding: 30px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .unit-column.center {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }

        .unit-label {
            color: white;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
            line-height: 1.3;
        }

        .unit-input {
            width: 100%;
            padding: 12px 8px;
            font-size: 18px;
            border: 3px solid white;
            border-radius: 10px;
            background: white;
            text-align: center;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }

        .unit-input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .unit-symbol {
            color: white;
            font-weight: bold;
            font-size: 18px;
            margin-top: 12px;
        }

        .buy-me-coffee {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .buy-me-coffee:hover {
            transform: translateY(-5px);
        }

        .buy-me-coffee img {
            height: 50px;
            width: auto;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 768px) {
            .buy-me-coffee {
                bottom: 10px;
                right: 10px;
            }

            .buy-me-coffee img {
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-button">
        <span data-i18n="back">← Matematica</span>
    </a>
    <div class="language-selector">
        <button class="lang-btn active" onclick="setLanguage('it')">🇮🇹 IT</button>
        <button class="lang-btn" onclick="setLanguage('en')">🇬🇧 EN</button>
    </div>
    <div class="container">
        <h1 data-i18n="title">Calcolatore di Equivalenze</h1>

        <div class="input-section">
            <div class="category-tabs">
                <button class="tab active" onclick="changeCategory('massa')" data-i18n="mass-tab">Massa (g)</button>
                <button class="tab" onclick="changeCategory('lunghezza')" data-i18n="length-tab">Lunghezza (m)</button>
                <button class="tab" onclick="changeCategory('volume')" data-i18n="volume-tab">Volume (l)</button>
            </div>
        </div>

        <div id="results" class="results">
            <!-- I risultati vengono inseriti qui dinamicamente -->
        </div>
    </div>

    <a href="https://www.buymeacoffee.com/manzolo" target="_blank" class="buy-me-coffee">
        <img src="https://cdn.buymeacoffee.com/buttons/v2/default-blue.png" alt="Buy Me A Coffee">
    </a>

    <script>
        let currentLanguage = 'it';

        const translations = {
            it: {
                'back': '← Matematica',
                'title': 'Calcolatore di Equivalenze',
                'mass-tab': 'Massa (g)',
                'length-tab': 'Lunghezza (m)',
                'volume-tab': 'Volume (l)'
            },
            en: {
                'back': '← Mathematics',
                'title': 'Unit Converter',
                'mass-tab': 'Mass (g)',
                'length-tab': 'Length (m)',
                'volume-tab': 'Volume (l)'
            }
        };

        function t(key) {
            return translations[currentLanguage][key] || key;
        }

        function setLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('language', lang);

            // Aggiorna i bottoni
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Aggiorna i testi statici
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    element.textContent = translations[lang][key];
                }
            });

            // Rigenera le unità con le nuove traduzioni
            renderUnits();
        }

        const conversions = {
            massa: {
                kg: { label: { it: 'Chilogrammi', en: 'Kilograms' }, toBase: 1000 },
                hg: { label: { it: 'Ettogrammi', en: 'Hectograms' }, toBase: 100 },
                dag: { label: { it: 'Decagrammi', en: 'Decagrams' }, toBase: 10 },
                g: { label: { it: 'Grammi', en: 'Grams' }, toBase: 1 },
                dg: { label: { it: 'Decigrammi', en: 'Decigrams' }, toBase: 0.1 },
                cg: { label: { it: 'Centigrammi', en: 'Centigrams' }, toBase: 0.01 },
                mg: { label: { it: 'Milligrammi', en: 'Milligrams' }, toBase: 0.001 }
            },
            lunghezza: {
                km: { label: { it: 'Chilometri', en: 'Kilometers' }, toBase: 1000 },
                hm: { label: { it: 'Ettometri', en: 'Hectometers' }, toBase: 100 },
                dam: { label: { it: 'Decametri', en: 'Decameters' }, toBase: 10 },
                m: { label: { it: 'Metri', en: 'Meters' }, toBase: 1 },
                dm: { label: { it: 'Decimetri', en: 'Decimeters' }, toBase: 0.1 },
                cm: { label: { it: 'Centimetri', en: 'Centimeters' }, toBase: 0.01 },
                mm: { label: { it: 'Millimetri', en: 'Millimeters' }, toBase: 0.001 }
            },
            volume: {
                kl: { label: { it: 'Chilolitri', en: 'Kiloliters' }, toBase: 1000 },
                hl: { label: { it: 'Ettolitri', en: 'Hectoliters' }, toBase: 100 },
                dal: { label: { it: 'Decalitri', en: 'Decaliters' }, toBase: 10 },
                l: { label: { it: 'Litri', en: 'Liters' }, toBase: 1 },
                dl: { label: { it: 'Decilitri', en: 'Deciliters' }, toBase: 0.1 },
                cl: { label: { it: 'Centilitri', en: 'Centiliters' }, toBase: 0.01 },
                ml: { label: { it: 'Millilitri', en: 'Milliliters' }, toBase: 0.001 }
            }
        };

        let currentCategory = 'massa';
        let isUpdating = false;

        function changeCategory(category) {
            currentCategory = category;

            // Aggiorna i tab attivi
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            renderUnits();
        }

        function renderUnits() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            // Definisce l'ordine delle unità (dalla più grande alla più piccola)
            const unitOrder = {
                massa: ['kg', 'hg', 'dag', 'g', 'dg', 'cg', 'mg'],
                lunghezza: ['km', 'hm', 'dam', 'm', 'dm', 'cm', 'mm'],
                volume: ['kl', 'hl', 'dal', 'l', 'dl', 'cl', 'ml']
            };

            // Identifica l'unità base (quella al centro)
            const baseUnit = {
                massa: 'g',
                lunghezza: 'm',
                volume: 'l'
            };

            const orderedUnits = unitOrder[currentCategory];

            orderedUnits.forEach(unit => {
                const data = conversions[currentCategory][unit];
                const isBase = unit === baseUnit[currentCategory];

                const column = document.createElement('div');
                column.className = isBase ? 'unit-column center' : 'unit-column';
                column.innerHTML = `
                    <div class="unit-label">${data.label[currentLanguage]}</div>
                    <input type="number" class="unit-input" id="input-${unit}" data-unit="${unit}" oninput="updateFromUnit('${unit}')" value="1" step="any">
                    <div class="unit-symbol">${unit}</div>
                `;

                resultsDiv.appendChild(column);
            });
        }

        function updateFromUnit(changedUnit) {
            if (isUpdating) return;
            isUpdating = true;

            const inputValue = document.getElementById(`input-${changedUnit}`).value;
            const value = parseFloat(inputValue);

            if (inputValue === '' || isNaN(value)) {
                // Se il campo è vuoto, azzera tutti gli altri
                for (const [unit, data] of Object.entries(conversions[currentCategory])) {
                    if (unit !== changedUnit) {
                        const input = document.getElementById(`input-${unit}`);
                        input.value = '';
                    }
                }
            } else {
                // Converti il valore in unità base (grammi, metri o litri)
                const baseValue = value * conversions[currentCategory][changedUnit].toBase;

                // Aggiorna tutti gli altri input
                for (const [unit, data] of Object.entries(conversions[currentCategory])) {
                    if (unit !== changedUnit) {
                        const convertedValue = baseValue / data.toBase;
                        const input = document.getElementById(`input-${unit}`);
                        // Arrotonda per evitare errori di precisione
                        const roundedValue = Math.round(convertedValue * 100000) / 100000;
                        input.value = roundedValue;
                    }
                }
            }

            isUpdating = false;
        }

        // Carica la lingua salvata o usa italiano come default
        window.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('language') || 'it';
            currentLanguage = savedLang;

            if (savedLang === 'en') {
                document.querySelector('.lang-btn.active').classList.remove('active');
                document.querySelectorAll('.lang-btn')[1].classList.add('active');

                // Aggiorna i testi statici
                document.querySelectorAll('[data-i18n]').forEach(element => {
                    const key = element.getAttribute('data-i18n');
                    if (translations['en'][key]) {
                        element.textContent = translations['en'][key];
                    }
                });
            }

            // Scegli una categoria casuale all'avvio
            const categories = ['massa', 'lunghezza', 'volume'];
            const randomCategory = categories[Math.floor(Math.random() * categories.length)];

            // Aggiorna il tab attivo
            document.querySelectorAll('.tab').forEach((tab, index) => {
                tab.classList.remove('active');
                if (categories[index] === randomCategory) {
                    tab.classList.add('active');
                }
            });

            // Inizializza con la categoria casuale
            currentCategory = randomCategory;
            renderUnits();
        });
    </script>
</body>
</html>
